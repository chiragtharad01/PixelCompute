<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <div class="pcontainer">

        <div class="content-div">

                <div class="img-container">

                        <button type="button" class="size-but">UK 10</button>
                        
                    </div>

                        <button type="button" id="but1">Add to Bag</button>
