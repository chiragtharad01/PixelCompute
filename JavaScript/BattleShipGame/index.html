<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship Game</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>Battleship</h1>
        <div class="main-outcome-container hidden">
            <div class="outcome-container">
                <button type="button" id="ok-button">OK</button>
            </div>
        </div>
        <div class="rules-container">
            <h3>Game Rules</h3>
            <ol>
                <li>Click on the cells to reveal the image hidden behind them.</li>
                <li>There are 5 ships hidden in the game.</li>
                <li>You win if you can find all ships in less than 8 clicks, else you lose. </li>
            </ol>
        </div>
        <div class="game-grid">
            <div class="grid-item">

            </div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
        </div>
        <button type="button" id="reset-button">Reset</button>
    </div>
    <script src="./script.js"></script>
</body>
</html>
