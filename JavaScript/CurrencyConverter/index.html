<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poor+Story&display=swap" rel="stylesheet"> 
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <form class="form-container">
            <label for="amount">Enter amount</label><br>
            <input class="btn" type="text" name="amount" id="user-amount" placeholder="100" required><br>
            <div class="conversion-container">
                <select class="btn" id="from">
                    <option value="" disabled selected hidden>USD - United States Dollar</option>
                </select>
                <label>TO</label>
                <select class="btn" id="to">
                    <option value="" disabled selected hidden>INR - Indian Rupee</option>
                </select>
            </div><br>
            <button type="button" id="submit-btn" class="btn">Convert</button>
        </form>
        <p id="result"></p>
        <p id="error"></p>
    </div>
    <script src="./script.js"></script>
</body>
</html>
