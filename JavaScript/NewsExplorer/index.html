<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Explorer</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="search-area">
            <input type="text" id="search-input" placeholder="Search for news">
        </div>
        <div class="header-section">
            <h1>Top Stories for you</h1>
        </div>
        <div class="filter-section">
            <ul>
                <li class="list-item selected">All</li>
                <li class="list-item">Business</li>
                <li class="list-item">Politics</li>
                <li class="list-item">Sport</li>
                <li class="list-item">Entertainment</li>                
            </ul>
        </div>
        <div class="news-section">
        </div>
        <div class="view-all-section">
            <button id="show-more-btn">Show More</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
